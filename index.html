<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f8fbfa">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Agenda - Tu agenda personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { min-height: 100%; }
  head, style { display: none !important; }
  body {
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }
  button, input, textarea, select { font: inherit; }
  button { cursor: pointer; color: inherit; }
  .header { position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; outline: none; }
  .search-icon { position: absolute; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .tabs { position: sticky; z-index: 99; }
  .tab { border: 0; cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.15s; white-space: nowrap; }
  .content { padding-bottom: 136px; }
  .reminder-card { position: relative; cursor: pointer; animation: slideIn 0.25s ease; transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .reminder-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
  .reminder-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .reminder-actions { display: flex; justify-content: flex-end; }
  .reminder-card.done { opacity: 0.68; }
  .reminder-card.cancelled { opacity: 0.56; }
  .reminder-card.done .reminder-text, .reminder-card.cancelled .reminder-text { text-decoration: line-through; color: var(--text2); }
  .stats-bar { display: grid; }
  .fab { position: fixed; z-index: 210; border: 0; color: white; }
  .overlay { position: fixed; inset: 0; z-index: 300; display: none; animation: fadeIn 0.2s; }
  .overlay.open { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { position: fixed; z-index: 301; transform: translateY(calc(100% + 24px)); transition: transform 0.32s cubic-bezier(0.34, 1.15, 0.64, 1); overflow-y: auto; }
  .modal.open { transform: translateY(0); }
  .modal-handle { display: none; }
  textarea { resize: none; }
  .parse-btn { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .parse-btn.loading { opacity: 0.68; pointer-events: none; }
  .parsed-preview { display: none; }
  .parsed-preview.show { display: block; }
  .parsed-item { display: flex; align-items: center; gap: 9px; }
  .parsed-dot { flex-shrink: 0; }
  .toast { position: fixed; top: 28px; left: 18px; right: 18px; max-width: 394px; margin: 0 auto; z-index: 500; transform: translateY(-18px); opacity: 0; transition: all 0.3s cubic-bezier(0.34, 1.15, 0.64, 1); pointer-events: none; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .cat-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
  .cat-chip { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .cat-count { display: inline-grid; place-items: center; min-width: 28px; min-height: 22px; padding: 0 7px; font-size: 11px; }
  .empty { text-align: center; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(8,148,83,0.22); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* iOS light redesign overrides */
  :root {
    --bg: #f8fbfa;
    --surface: rgba(255,255,255,0.92);
    --surface2: #ffffff;
    --surface3: #eef4f1;
    --border: #e0e8e4;
    --accent: #089453;
    --accent2: #006f4e;
    --accent-glow: rgba(8,148,83,0.28);
    --green: #089453;
    --green-dim: rgba(8,148,83,0.12);
    --red: #d95d55;
    --red-dim: rgba(217,93,85,0.12);
    --yellow: #e0a424;
    --yellow-dim: rgba(255,216,99,0.24);
    --text: #0c2631;
    --text2: #627083;
    --text3: #8b96a7;
    --radius: 24px;
    --radius-sm: 18px;
    --shadow: 0 22px 52px rgba(28,50,58,0.12);
  }

  html { background: #d7dde2; min-height: 100%; }
  body {
    background:
      radial-gradient(circle at 88% 14%, rgba(8,148,83,0.06), transparent 26%),
      radial-gradient(circle at 16% 78%, rgba(8,148,83,0.05), transparent 22%),
      var(--bg);
    color: var(--text);
    font-family: "Inter", "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 30px 90px rgba(11,28,40,0.18);
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    max-width: 430px;
    margin: 0 auto;
    pointer-events: none;
    opacity: 0.32;
    background-image:
      radial-gradient(circle at 20px 20px, rgba(8,148,83,0.10) 0 1px, transparent 1.5px),
      radial-gradient(circle at 72px 52px, rgba(12,38,49,0.07) 0 1px, transparent 1.5px);
    background-size: 86px 86px, 118px 118px;
    mask-image: linear-gradient(to bottom, transparent 0, #000 190px, #000 calc(100% - 220px), transparent 100%);
  }
  body::after {
    content: "";
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: 18px;
    max-width: 398px;
    height: 76px;
    margin: 0 auto;
    border-radius: 26px;
    background: rgba(255,255,255,0.94);
    border: 1px solid var(--border);
    box-shadow: 0 18px 45px rgba(24,48,62,0.13);
    z-index: 180;
    pointer-events: none;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  button, input, textarea, select { font-family: "Inter", "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important; }

  .header {
    padding: 42px 28px 18px;
    background: linear-gradient(180deg, rgba(248,251,250,0.98) 0%, rgba(248,251,250,0.86) 72%, rgba(248,251,250,0) 100%);
    border-bottom: 0;
  }
  .header-top {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: start;
    gap: 14px;
    margin-bottom: 18px;
  }
  .logo {
    display: block;
    grid-column: 1;
    grid-row: 1;
    color: var(--text);
    font-family: inherit;
    font-size: 38px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: 0;
    background: none;
    -webkit-text-fill-color: currentColor;
  }
  .logo::after {
    content: attr(data-count) " pendientes";
    display: block;
    margin-top: 10px;
    color: var(--accent);
    font-size: 16px;
    font-weight: 800;
    line-height: 1.2;
  }
  .header-date { display: none; }
  .header-top::before,
  .header-top::after {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    color: #0d1e2e;
    font-size: 34px;
    line-height: 1;
  }
  .header-top::before { content: "⌕"; grid-column: 2; grid-row: 1; }
  .header-top::after { content: "⋮"; grid-column: 3; grid-row: 1; font-weight: 800; }

  .search-wrap input {
    min-height: 52px;
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0 52px 0 20px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
  }
  .search-wrap input:focus {
    border-color: rgba(8,148,83,0.38);
    box-shadow: 0 16px 36px rgba(8,148,83,0.13);
  }
  .search-wrap input::placeholder { color: #8a95a6; font-weight: 600; }
  .search-icon { right: 18px; color: var(--text2); font-size: 18px; }

  .tabs {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 4px;
    margin: 4px 22px 22px;
    padding: 8px;
    background: rgba(255,255,255,0.88);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
    top: 126px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .tab {
    min-width: 0;
    min-height: 42px;
    border: 0;
    border-radius: 22px;
    background: transparent;
    color: var(--text2);
    font-size: clamp(11px, 2.7vw, 13px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: 0;
  }
  .tab.active {
    background: linear-gradient(135deg, #e0f4e7, #d6f0e1);
    color: var(--accent2);
    box-shadow: none;
  }

  .content { padding: 0 28px 136px; position: relative; z-index: 1; }
  .section-title {
    color: var(--accent2);
    font-family: inherit;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0;
    margin: 30px 0 14px;
  }
  .stats-bar { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 2px 0 22px; }
  .stat-box {
    min-height: 86px;
    padding: 14px 8px;
    background: rgba(255,255,255,0.86);
    border: 1px solid var(--border);
    border-radius: 22px;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
  }
  .stat-num { font-family: inherit; font-size: 28px; font-weight: 900; letter-spacing: 0; }
  .stat-label { color: var(--text2); font-size: 11px; font-weight: 800; }

  .overdue-banner {
    color: #946b00;
    background: #fff5d6;
    border: 1px solid #f4df9a;
    border-radius: 20px;
    padding: 13px 15px;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
    font-weight: 700;
  }
  .reminder-card {
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 16px 16px 14px;
    margin: 0 0 14px 68px;
    overflow: visible;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
  }
  .reminder-card::before {
    left: -54px;
    top: 29px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 7px rgba(8,148,83,0.10);
  }
  .reminder-card::after {
    content: "";
    position: absolute;
    left: -52px;
    top: -18px;
    width: 2px;
    height: calc(100% + 36px);
    border-radius: 2px;
    background: linear-gradient(to bottom, transparent, rgba(8,148,83,0.22) 18%, rgba(8,148,83,0.22) 82%, transparent);
    z-index: -1;
  }
  .reminder-card.pending:nth-of-type(3n), .reminder-card.overdue {
    background: linear-gradient(135deg, rgba(232,248,237,0.96), rgba(255,255,255,0.94));
  }
  .reminder-card.pending:nth-of-type(4n) {
    background: linear-gradient(135deg, rgba(255,247,213,0.92), rgba(255,255,255,0.94));
    border-color: #efdfac;
  }
  .reminder-text { color: #122034; font-size: 16px; font-weight: 850; line-height: 1.28; }
  .reminder-time, .reminder-date, .cat-badge {
    min-height: 26px;
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    line-height: 1;
  }
  .reminder-time { color: var(--accent2); background: #dff3e7; padding: 0 10px; }
  .reminder-date { color: var(--text2); background: rgba(98,112,131,0.09); padding: 0 10px; }
  .cat-badge { color: #596475; background: #f1f4f4; padding: 0 10px; }
  .reminder-actions { gap: 7px; margin-top: 14px; flex-wrap: wrap; }
  .btn-action {
    min-height: 32px;
    padding: 0 12px;
    border-radius: 999px;
    border: 0;
    font-size: 12px;
    font-weight: 850;
  }
  .btn-done { color: var(--accent2); background: #dff3e7; }
  .btn-cancel { color: #b94b44; background: var(--red-dim); }
  .btn-edit { color: #425067; background: #eef2f2; }
  .btn-delete { color: #7d8796; border: 1px solid var(--border); background: transparent; }

  .fab {
    right: calc(50% - 190px);
    left: auto;
    bottom: 104px;
    width: 76px;
    height: 76px;
    padding: 0;
    max-width: none;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 25%, #15b66c, #008651 58%, #006f4e 100%);
    box-shadow: 0 22px 42px rgba(0,135,80,0.36);
    display: grid;
    place-items: center;
    overflow: hidden;
    text-indent: -999px;
  }
  .fab span {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    text-indent: 0;
    font-size: 54px !important;
    font-weight: 300;
    transform: translateY(-3px);
  }

  .overlay { background: rgba(13,29,39,0.36); backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px); }
  .modal {
    left: 14px;
    right: 14px;
    bottom: 14px;
    max-width: 402px;
    background: rgba(255,255,255,0.98);
    border: 1px solid rgba(203,217,211,0.95);
    border-radius: 28px;
    padding: 22px 22px 24px;
    box-shadow: 0 30px 80px rgba(13,29,39,0.26);
    max-height: calc(100dvh - 28px);
  }
  .modal-handle { display: none; }
  .modal-title {
    color: #073035;
    font-family: inherit;
    font-size: 30px;
    font-weight: 900;
    line-height: 1.05;
    margin: 4px 40px 22px 0;
  }
  .modal::before {
    content: "×";
    position: absolute;
    right: 22px;
    top: 18px;
    color: #17243a;
    font-size: 42px;
    font-weight: 300;
    line-height: 1;
    pointer-events: none;
  }
  .field-label {
    color: #14263a;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 0;
    text-transform: none;
    margin: 18px 0 9px;
  }
  .field-hint { color: var(--text2); font-size: 12px; font-weight: 600; line-height: 1.45; }
  textarea, input[type="text"], input[type="date"], input[type="time"], select {
    min-height: 58px;
    background: rgba(255,255,255,0.94);
    border: 1px solid #dce6e1;
    border-radius: 18px;
    padding: 15px 16px;
    color: var(--text);
    font-size: 15px;
    font-weight: 650;
  }
  textarea { min-height: 116px; line-height: 1.45; }
  textarea:focus, input:focus, select:focus {
    border-color: rgba(8,148,83,0.44);
    box-shadow: 0 0 0 4px rgba(8,148,83,0.08);
  }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .parse-btn {
    min-height: 52px;
    border: 1px dashed rgba(8,148,83,0.38);
    border-radius: 18px;
    background: #dff3e7;
    color: var(--accent2);
    font-size: 14px;
    font-weight: 900;
  }
  .parsed-preview { background: #f2faf5; border: 1px solid rgba(8,148,83,0.18); border-radius: 18px; }
  .modal-btns { display: grid; grid-template-columns: 84px 1fr; gap: 12px; }
  .btn-primary, .btn-secondary {
    min-height: 58px;
    border-radius: 999px;
    font-size: 15px;
    font-weight: 900;
  }
  .btn-primary { background: linear-gradient(135deg, #0aaa60, #007f51); box-shadow: 0 16px 34px rgba(8,148,83,0.28); }
  .btn-secondary { color: var(--text2); background: #eef3f1; }

  .empty {
    margin: 62px 4px 0;
    padding: 34px 24px 32px;
    color: var(--text2);
    background: rgba(255,255,255,0.90);
    border: 1px solid var(--border);
    border-radius: 28px;
    box-shadow: var(--shadow);
  }
  .empty-icon {
    width: 108px;
    height: 108px;
    margin: 0 auto 24px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: #dff3e7;
    font-size: 48px;
  }
  .empty-title { color: #073035; font-family: inherit; font-size: 20px; font-weight: 900; }
  .empty-sub { color: var(--text2); font-size: 15px; font-weight: 500; line-height: 1.55; }
  .toast {
    background: rgba(255,255,255,0.96);
    border: 1px solid rgba(8,148,83,0.24);
    border-radius: 22px;
    box-shadow: var(--shadow);
  }
  .toast-title { color: var(--accent2); font-weight: 900; }
  .cat-chip {
    min-height: 42px;
    padding: 0 15px;
    color: var(--text2);
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 850;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
  }
  .cat-chip.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .cat-count { background: rgba(255,255,255,0.26); border-radius: 999px; font-weight: 900; }
  .category-panel,
  .alarm-card {
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 10px 30px rgba(32,55,70,0.08);
  }
  .category-panel {
    padding: 16px;
    margin-bottom: 18px;
  }
  .category-add {
    display: grid;
    grid-template-columns: 1fr 46px;
    gap: 10px;
    margin-bottom: 14px;
  }
  .category-add input {
    min-height: 46px;
    border-radius: 999px;
  }
  .category-add button,
  .category-action {
    border: 0;
    cursor: pointer;
    color: #fff;
    background: var(--accent);
    border-radius: 999px;
    font-size: 18px;
    font-weight: 900;
  }
  .category-list {
    display: grid;
    gap: 10px;
  }
  .category-row {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 8px;
    padding: 10px 10px 10px 14px;
    background: #f7faf8;
    border: 1px solid var(--border);
    border-radius: 18px;
  }
  .category-name {
    min-width: 0;
    color: var(--text);
    font-size: 14px;
    font-weight: 850;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .category-action {
    width: 34px;
    height: 34px;
    color: var(--text2);
    background: #edf3f0;
    font-size: 14px;
  }
  .category-action.delete {
    color: #ad3d37;
    background: #fde7e5;
  }
  .alarm-overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(18,30,42,0.46);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 700;
  }
  .alarm-overlay.open { display: flex; }
  .alarm-card {
    width: min(390px, 100%);
    padding: 28px 22px 22px;
    text-align: center;
    animation: alarmIn 0.24s ease;
  }
  @keyframes alarmIn {
    from { opacity: 0; transform: translateY(18px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .alarm-icon {
    width: 86px;
    height: 86px;
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    color: var(--accent);
    background: #dff3e7;
    font-size: 44px;
    box-shadow: 0 0 0 12px rgba(8,148,83,0.06);
  }
  .alarm-title {
    color: var(--accent2);
    font-size: 28px;
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 20px;
  }
  .alarm-detail {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 14px;
    align-items: center;
    text-align: left;
    padding: 16px;
    margin-bottom: 18px;
    background: linear-gradient(135deg, #eef8f2, #f9fcfa);
    border-radius: 20px;
  }
  .alarm-pin {
    width: 64px;
    height: 64px;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: #dff3e7;
    font-size: 32px;
  }
  .alarm-text {
    color: #111d2c;
    font-size: 20px;
    font-weight: 900;
    line-height: 1.18;
    margin-bottom: 6px;
  }
  .alarm-date {
    color: var(--text2);
    font-size: 14px;
    font-weight: 650;
  }
  .alarm-time {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-height: 42px;
    padding: 0 16px;
    margin-bottom: 20px;
    color: var(--accent2);
    background: #dff3e7;
    border-radius: 16px;
    font-size: 22px;
    font-weight: 900;
  }
  .alarm-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .alarm-done,
  .alarm-close {
    min-height: 58px;
    border: 0;
    border-radius: 18px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 900;
  }
  .alarm-done {
    color: #fff;
    background: linear-gradient(135deg, #0aaa60, #007f51);
    box-shadow: 0 16px 34px rgba(8,148,83,0.26);
  }
  .alarm-close {
    color: #a31313;
    background: #fde1df;
  }
  ::-webkit-scrollbar { width: 0; }
  @media (max-width: 390px) {
    .header { padding-left: 22px; padding-right: 22px; }
    .content { padding-left: 22px; padding-right: 22px; }
    .logo { font-size: 34px; }
    .tabs { margin-left: 18px; margin-right: 18px; top: 120px; }
    .reminder-card { margin-left: 52px; }
    .reminder-card::before { left: -40px; }
    .reminder-card::after { left: -37px; }
    .fab { right: 24px; width: 70px; height: 70px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <span class="logo" data-count="0">Agenda</span>
    <span class="header-date" id="headerDate"></span>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Buscar recordatorios" oninput="renderAll()">
    <span class="search-icon">⌕</span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('pending', this)">Hoy</button>
  <button class="tab" onclick="switchTab('upcoming', this)">Mañana</button>
  <button class="tab" onclick="switchTab('done', this)">Hechos</button>
  <button class="tab" onclick="switchTab('categories', this)">Categorías</button>
</div>

<!-- CONTENT -->
<div class="content" id="mainContent"></div>

<!-- FAB -->
<button class="fab" onclick="openModal()">
  <span style="font-size:18px">+</span> Nuevo recordatorio
</button>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modalTitle">Nuevo recordatorio</div>

  <div class="field-label">¿Qué quieres recordar?</div>
  <div class="field-hint">Puedes escribir en lenguaje natural: "llamar a Juan mañana a las 10"</div>
  <textarea id="reminderText" placeholder="Ej: comprar pan mañana a las 8&#10;Ej: 09:00 Mariano 11:00 Yami 12:00 Mica" rows="3"></textarea>

  <button class="parse-btn" id="parseBtn" onclick="parseWithAI()">
    <span id="parseBtnIcon">✨</span> <span id="parseBtnText">Interpretar con IA</span>
  </button>

  <div class="parsed-preview" id="parsedPreview"></div>

  <div class="row-2" style="margin-top:6px">
    <div>
      <div class="field-label">Fecha</div>
      <input type="date" id="reminderDate">
    </div>
    <div>
      <div class="field-label">Hora</div>
      <input type="time" id="reminderTime">
    </div>
  </div>

  <div class="field-label">Categoría</div>
  <select id="reminderCat">
    <option value="">Sin categoría</option>
  </select>

  <div class="modal-btns">
    <button class="btn-secondary" onclick="closeModal()">Cerrar</button>
    <button class="btn-primary" onclick="saveReminder()">Guardar recordatorio</button>
  </div>
</div>

<!-- NOTIFICATION TOAST -->
<div class="toast" id="toast">
  <div class="toast-title">⏰ ¡Recordatorio!</div>
  <div class="toast-body" id="toastBody"></div>
  <div class="toast-time" id="toastTime"></div>
</div>

<div class="alarm-overlay" id="alarmOverlay">
  <div class="alarm-card" role="dialog" aria-modal="true" aria-labelledby="alarmTitle">
    <div class="alarm-icon">🔔</div>
    <div class="alarm-title" id="alarmTitle">¡Es hora de tu recordatorio!</div>
    <div class="alarm-detail">
      <div class="alarm-pin">📌</div>
      <div>
        <div class="alarm-text" id="alarmText"></div>
        <div class="alarm-date" id="alarmDate"></div>
      </div>
    </div>
    <div class="alarm-time" id="alarmTime">🕐 --:--</div>
    <div class="alarm-actions">
      <button class="alarm-done" onclick="completeAlarmReminder()">✓ Marcar como hecho</button>
      <button class="alarm-close" onclick="closeAlarm()">✕ Cerrar</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let reminders = JSON.parse(localStorage.getItem('reminders_v3') || '[]');
let currentTab = 'pending';
let editingId = null;
let pendingParsed = [];
let activeCatFilter = null;
let activeAlarmId = null;
let internalClock = new Date();
let alarmInterval = null;
const defaultCategories = ['Salud', 'Trabajo', 'Personal', 'Compras', 'Social', 'Finanzas', 'Familia', 'Otro'];
const categoryIcons = {
  'Salud': '💊',
  'Trabajo': '💼',
  'Personal': '👤',
  'Compras': '🛒',
  'Social': '🤝',
  'Finanzas': '💰',
  'Familia': '👨‍👩‍👧',
  'Otro': '📌'
};
let categories = loadCategories();

// ─── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  updateHeaderDate();
  renderCategoryOptions();
  renderAll();
  startAlarmChecker();
  setDefaultDateTime();
});

function updateHeaderDate() {
  const d = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('headerDate').textContent =
    d.toLocaleDateString('es-AR', opts);
}

function setDefaultDateTime() {
  const now = new Date();
  now.setMinutes(now.getMinutes() + 30);
  document.getElementById('reminderDate').value = toDateInput(now);
  document.getElementById('reminderTime').value = toTimeInput(now);
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem('reminders_v3', JSON.stringify(reminders));
}

function saveCategories() {
  localStorage.setItem('reminder_categories_v1', JSON.stringify(categories));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function toDateInput(d) {
  return d.toISOString().slice(0, 10);
}
function toTimeInput(d) {
  return d.toTimeString().slice(0, 5);
}
function formatDate(dateStr) {
  if (!dateStr) return '';
  const [y, m, day] = dateStr.split('-');
  const d = new Date(+y, +m - 1, +day);
  const opts = { weekday:'short', day:'numeric', month:'short' };
  return d.toLocaleDateString('es-AR', opts);
}
function isToday(dateStr) {
  return dateStr === toDateInput(new Date());
}
function isTomorrow(dateStr) {
  const t = new Date(); t.setDate(t.getDate() + 1);
  return dateStr === toDateInput(t);
}
function isPast(r) {
  if (!r.date || !r.time) return false;
  const dt = new Date(r.date + 'T' + r.time);
  return dt < new Date();
}
function friendlyDate(dateStr) {
  if (!dateStr) return '';
  if (isToday(dateStr)) return 'Hoy';
  if (isTomorrow(dateStr)) return 'Mañana';
  return formatDate(dateStr);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  currentTab = tab;
  activeCatFilter = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderAll() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const c = document.getElementById('mainContent');
  const logo = document.querySelector('.logo');
  if (logo) logo.dataset.count = reminders.filter(r => r.status === 'pending').length;

  if (currentTab === 'categories') {
    renderCategories(c, q);
    return;
  }

  let list = reminders.filter(r => {
    if (q && !r.text.toLowerCase().includes(q)) return false;
    if (activeCatFilter && r.category !== activeCatFilter) return false;
    if (currentTab === 'pending') return r.status === 'pending';
    if (currentTab === 'upcoming') return r.status === 'pending';
    if (currentTab === 'done') return r.status === 'done' || r.status === 'cancelled';
    return true;
  });

  // Sort
  list.sort((a, b) => {
    const da = (a.date || '9999') + 'T' + (a.time || '00:00');
    const db = (b.date || '9999') + 'T' + (b.time || '00:00');
    return da.localeCompare(db);
  });

  if (currentTab === 'upcoming') {
    // Next 7 days only
    const limit = new Date(); limit.setDate(limit.getDate() + 7);
    list = list.filter(r => {
      if (!r.date) return false;
      const dt = new Date(r.date + 'T' + (r.time || '00:00'));
      return dt <= limit;
    });
  }

  // Stats
  const pending = reminders.filter(r => r.status === 'pending').length;
  const doneCount = reminders.filter(r => r.status === 'done').length;
  const overdueCount = reminders.filter(r => r.status === 'pending' && isPast(r)).length;

  let html = '';

  if (currentTab === 'pending') {
    html += `<div class="stats-bar">
      <div class="stat-box"><div class="stat-num" style="color:var(--accent2)">${pending}</div><div class="stat-label">Pendientes</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${doneCount}</div><div class="stat-label">Completados</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--yellow)">${overdueCount}</div><div class="stat-label">Vencidos</div></div>
    </div>`;
    if (overdueCount > 0) {
      html += `<div class="overdue-banner">⚠️ Tenés ${overdueCount} recordatorio${overdueCount > 1 ? 's' : ''} vencido${overdueCount > 1 ? 's' : ''}.</div>`;
    }
  }

  if (list.length === 0) {
    html += emptyState(currentTab);
  } else {
    // Group by date
    const groups = {};
    list.forEach(r => {
      const key = r.date || 'sin-fecha';
      if (!groups[key]) groups[key] = [];
      groups[key].push(r);
    });

    Object.keys(groups).sort().forEach(key => {
      const label = key === 'sin-fecha' ? 'Sin fecha' : friendlyDate(key);
      html += `<div class="section-title">${label}</div>`;
      groups[key].forEach(r => { html += renderCard(r); });
    });
  }

  c.innerHTML = html;
}

function renderCard(r) {
  const overdue = r.status === 'pending' && isPast(r);
  const cls = overdue ? 'overdue' : r.status;
  const statusIcon = r.status === 'done' ? '✅' : r.status === 'cancelled' ? '🚫' : overdue ? '⚠️' : '';

  const actions = r.status === 'pending'
    ? `<button class="btn-action btn-done" onclick="markDone('${r.id}')">✓ Hecho</button>
       <button class="btn-action btn-cancel" onclick="markCancelled('${r.id}')">✕ Cancelar</button>
       <button class="btn-action btn-edit" onclick="editReminder('${r.id}')">✎</button>
       <button class="btn-action btn-delete" onclick="deleteReminder('${r.id}')">🗑</button>`
    : `<button class="btn-action btn-edit" onclick="undoStatus('${r.id}')">↩ Reactivar</button>
       <button class="btn-action btn-delete" onclick="deleteReminder('${r.id}')">🗑</button>`;

  return `<div class="reminder-card ${cls}" id="card-${r.id}">
    <div class="reminder-header">
      <div class="reminder-text">${statusIcon ? statusIcon + ' ' : ''}${escHtml(r.text)}</div>
    </div>
    <div class="reminder-meta">
      ${r.time ? `<span class="reminder-time">🕐 ${r.time}</span>` : ''}
      ${r.date ? `<span class="reminder-date">${friendlyDate(r.date)}</span>` : ''}
      ${r.category ? `<span class="cat-badge">${r.category}</span>` : ''}
    </div>
    <div class="reminder-actions">${actions}</div>
  </div>`;
}

function renderCategories(c, q) {
  const cats = {};
  reminders.forEach(r => {
    const k = r.category || '(Sin categoría)';
    if (!cats[k]) cats[k] = { total: 0, pending: 0 };
    cats[k].total++;
    if (r.status === 'pending') cats[k].pending++;
  });

  let html = `<div class="section-title">Categorías</div>
    <div class="category-panel">
      <div class="category-add">
        <input id="newCategoryName" type="text" placeholder="Nueva categoría" onkeydown="if(event.key==='Enter') addCategory()">
        <button onclick="addCategory()">+</button>
      </div>
      <div class="category-list">
        ${categories.map(name => `<div class="category-row">
          <span class="category-name">${getCategoryIcon(name)} ${escHtml(name)}</span>
          <button class="category-action" onclick="renameCategory(${jsArg(name)})">✎</button>
          <button class="category-action delete" onclick="deleteCategoryName(${jsArg(name)})">×</button>
        </div>`).join('')}
      </div>
    </div>
    <div class="cat-list">`;

  const entries = Object.entries(cats);
  if (entries.length === 0) {
    html += '</div>' + emptyState('categories');
    c.innerHTML = html;
    return;
  }

  entries.sort((a,b) => b[1].pending - a[1].pending).forEach(([name, info]) => {
    const icon = name === '(Sin categoría)' ? '📂' : getCategoryIcon(name);
    const isActive = activeCatFilter === name;
    html += `<div class="cat-chip ${isActive ? 'active' : ''}" onclick="filterByCategory(${jsArg(name)})">
      ${icon} ${escHtml(name)} <span class="cat-count">${info.pending}/${info.total}</span>
    </div>`;
  });
  html += '</div>';

  if (activeCatFilter) {
    const filtered = reminders.filter(r =>
      (r.category || '(Sin categoría)') === activeCatFilter &&
      (q ? r.text.toLowerCase().includes(q) : true)
    );
    html += `<div class="section-title" style="margin-top:20px">${escHtml(activeCatFilter)}</div>`;
    if (filtered.length === 0) {
      html += '<p style="color:var(--text3);font-size:13px;padding:12px 0">No hay recordatorios en esta categoría.</p>';
    } else {
      filtered.sort((a,b) => ((a.date||'9999')+'T'+(a.time||'00:00')).localeCompare((b.date||'9999')+'T'+(b.time||'00:00')))
        .forEach(r => { html += renderCard(r); });
    }
  }

  c.innerHTML = html;
}

function filterByCategory(name) {
  activeCatFilter = activeCatFilter === name ? null : name;
  renderAll();
}

function emptyState(tab) {
  const msgs = {
    pending: { icon: '🎉', title: '¡Todo al día!', sub: 'No tenés recordatorios pendientes.\nTocá + para agregar uno.' },
    upcoming: { icon: '📅', title: 'Sin próximos eventos', sub: 'Los recordatorios de los próximos 7 días aparecen acá.' },
    done: { icon: '📋', title: 'Sin historial', sub: 'Los recordatorios completados o cancelados aparecerán acá.' },
    categories: { icon: '🏷️', title: 'Sin categorías', sub: 'Asigná categorías a tus recordatorios para organizarlos.' }
  };
  const m = msgs[tab] || msgs.pending;
  return `<div class="empty">
    <div class="empty-icon">${m.icon}</div>
    <div class="empty-title">${m.title}</div>
    <div class="empty-sub">${m.sub.replace(/\n/g,'<br>')}</div>
  </div>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return escHtml(s).replace(/"/g,'&quot;');
}
function jsArg(s) {
  return JSON.stringify(s).replace(/"/g, '&quot;').replace(/</g, '\\u003c');
}
function loadCategories() {
  let stored = defaultCategories;
  const raw = localStorage.getItem('reminder_categories_v1');
  try { stored = raw ? JSON.parse(raw) : defaultCategories; } catch(e) { stored = defaultCategories; }
  const fromReminders = reminders.map(r => r.category).filter(Boolean);
  return [...new Set([...stored, ...fromReminders])].filter(Boolean);
}
function getCategoryIcon(name) {
  return categoryIcons[name] || '🏷️';
}
function renderCategoryOptions(selected) {
  const select = document.getElementById('reminderCat');
  if (!select) return;
  const value = selected ?? select.value;
  select.innerHTML = '<option value="">Sin categoría</option>' +
    categories.map(cat => `<option value="${escAttr(cat)}">${getCategoryIcon(cat)} ${escHtml(cat)}</option>`).join('');
  select.value = categories.includes(value) ? value : '';
}
function addCategory() {
  const input = document.getElementById('newCategoryName');
  const name = (input?.value || '').trim();
  if (!name) return;
  if (!categories.some(c => c.toLowerCase() === name.toLowerCase())) {
    categories.push(name);
    saveCategories();
    renderCategoryOptions(name);
  }
  if (input) input.value = '';
  renderAll();
}
function renameCategory(oldName) {
  const nextName = prompt('Nuevo nombre de categoría', oldName);
  if (nextName === null) return;
  const clean = nextName.trim();
  if (!clean || clean === oldName) return;
  if (categories.some(c => c.toLowerCase() === clean.toLowerCase() && c !== oldName)) {
    alert('Ya existe una categoría con ese nombre.');
    return;
  }
  categories = categories.map(c => c === oldName ? clean : c);
  reminders.forEach(r => { if (r.category === oldName) r.category = clean; });
  if (activeCatFilter === oldName) activeCatFilter = clean;
  saveCategories();
  save();
  renderCategoryOptions(clean);
  renderAll();
}
function deleteCategoryName(name) {
  if (!confirm(`¿Eliminar la categoría "${name}"? Los recordatorios quedarán sin categoría.`)) return;
  categories = categories.filter(c => c !== name);
  reminders.forEach(r => { if (r.category === name) r.category = ''; });
  if (activeCatFilter === name) activeCatFilter = null;
  saveCategories();
  save();
  renderCategoryOptions();
  renderAll();
}

// ─── ACTIONS ─────────────────────────────────────────────────────────────────
function markDone(id) {
  const r = reminders.find(x => x.id === id);
  if (r) { r.status = 'done'; save(); renderAll(); }
}
function markCancelled(id) {
  const r = reminders.find(x => x.id === id);
  if (r) { r.status = 'cancelled'; save(); renderAll(); }
}
function undoStatus(id) {
  const r = reminders.find(x => x.id === id);
  if (r) { r.status = 'pending'; save(); renderAll(); }
}
function deleteReminder(id) {
  reminders = reminders.filter(x => x.id !== id);
  save(); renderAll();
}

function editReminder(id) {
  const r = reminders.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar recordatorio';
  document.getElementById('reminderText').value = r.text;
  document.getElementById('reminderDate').value = r.date || '';
  document.getElementById('reminderTime').value = r.time || '';
  renderCategoryOptions(r.category || '');
  document.getElementById('reminderCat').value = r.category || '';
  document.getElementById('parsedPreview').classList.remove('show');
  pendingParsed = [];
  openModal();
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal() {
  renderCategoryOptions(document.getElementById('reminderCat').value);
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('reminderText').focus(), 350);
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
  editingId = null;
  pendingParsed = [];
  document.getElementById('modalTitle').textContent = 'Nuevo recordatorio';
  document.getElementById('reminderText').value = '';
  document.getElementById('parsedPreview').classList.remove('show');
  setDefaultDateTime();
  document.getElementById('reminderCat').value = '';
}

// ─── SAVE ─────────────────────────────────────────────────────────────────────
function saveReminder() {
  // If we have AI-parsed multi-reminders, save them all
  if (pendingParsed.length > 1) {
    const cat = document.getElementById('reminderCat').value;
    pendingParsed.forEach(p => {
      reminders.unshift({
        id: genId(),
        text: p.text,
        date: p.date,
        time: p.time,
        category: cat,
        status: 'pending',
        created: Date.now(),
        notified: false
      });
    });
    save(); renderAll(); closeModal();
    showToast('💡 ' + pendingParsed.length + ' recordatorios guardados', '');
    return;
  }

  const text = document.getElementById('reminderText').value.trim();
  if (!text) { alert('Escribí el texto del recordatorio.'); return; }

  const date = document.getElementById('reminderDate').value;
  const time = document.getElementById('reminderTime').value;
  const category = document.getElementById('reminderCat').value;

  if (editingId) {
    const r = reminders.find(x => x.id === editingId);
    if (r) { r.text = text; r.date = date; r.time = time; r.category = category; r.notified = false; }
  } else {
    reminders.unshift({ id: genId(), text, date, time, category, status: 'pending', created: Date.now(), notified: false });
  }

  save(); renderAll(); closeModal();
}

// ─── AI PARSE ─────────────────────────────────────────────────────────────────
async function parseWithAI() {
  const text = document.getElementById('reminderText').value.trim();
  if (!text) { alert('Primero escribí el texto a interpretar.'); return; }

  const btn = document.getElementById('parseBtn');
  const icon = document.getElementById('parseBtnIcon');
  const label = document.getElementById('parseBtnText');
  btn.classList.add('loading');
  icon.innerHTML = '<span class="spinner"></span>';
  label.textContent = 'Interpretando…';

  const today = new Date();
  const todayStr = toDateInput(today);
  const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
  const tomorrowStr = toDateInput(tomorrow);

  // Day name → date mapping (next 7 days)
  const dayNames = { lunes:0, martes:1, miércoles:2, miercoles:2, jueves:3, viernes:4, sábado:5, sabado:5, domingo:6 };
  const dayMap = {};
  for (let i = 0; i <= 6; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const name = d.toLocaleDateString('es-AR',{weekday:'long'}).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    dayMap[name] = toDateInput(d);
  }

  const systemPrompt = `Sos un asistente que extrae recordatorios de texto en español argentino.
Hoy es ${todayStr} (${today.toLocaleDateString('es-AR',{weekday:'long'})}).
Mañana es ${tomorrowStr}.
Los días de la semana próximos: ${JSON.stringify(dayMap)}.

Tu tarea: analizar el texto del usuario y extraer UNO o VARIOS recordatorios.
Devolvé SOLO un JSON válido con este formato (sin texto extra, sin markdown):
{"reminders":[{"text":"texto del recordatorio","date":"YYYY-MM-DD o null","time":"HH:MM o null"}]}

Ejemplos de entrada y salida:
- "comprar pan mañana a las 8" → {"reminders":[{"text":"Comprar pan","date":"${tomorrowStr}","time":"08:00"}]}
- "llamar a Juan el viernes a las 10" → {"reminders":[{"text":"Llamar a Juan","date":"<próximo viernes>","time":"10:00"}]}
- "09:00 Mariano 11:00 Yami 12:00 Mica" → {"reminders":[{"text":"Mariano","date":"${todayStr}","time":"09:00"},{"text":"Yami","date":"${todayStr}","time":"11:00"},{"text":"Mica","date":"${todayStr}","time":"12:00"}]}
- "tomar medicamento hoy a las 20" → {"reminders":[{"text":"Tomar medicamento","date":"${todayStr}","time":"20:00"}]}
- "reunión de trabajo" → {"reminders":[{"text":"Reunión de trabajo","date":null,"time":null}]}

Reglas:
- El campo "text" debe ser conciso y descriptivo (sin la fecha/hora).
- Si hay múltiples horarios en el texto, separalos en recordatorios distintos.
- Si no hay fecha, usá null.
- Si no hay hora, usá null.
- Devolvé SOLO el JSON, sin explicaciones.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: text }]
      })
    });

    const data = await response.json();
    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    const clean = raw.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);

    pendingParsed = parsed.reminders || [];

    if (pendingParsed.length === 0) throw new Error('Sin resultados');

    // Update form with first result
    document.getElementById('reminderText').value = pendingParsed[0].text;
    if (pendingParsed[0].date) document.getElementById('reminderDate').value = pendingParsed[0].date;
    if (pendingParsed[0].time) document.getElementById('reminderTime').value = pendingParsed[0].time;

    // Show preview
    let previewHtml = `<div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:8px">✅ ${pendingParsed.length === 1 ? '1 recordatorio detectado' : pendingParsed.length + ' recordatorios detectados'}</div>`;
    pendingParsed.forEach(p => {
      previewHtml += `<div class="parsed-item">
        <span class="parsed-dot"></span>
        <span><strong>${escHtml(p.text)}</strong>${p.date ? ' · ' + friendlyDate(p.date) : ''}${p.time ? ' · ' + p.time : ''}</span>
      </div>`;
    });
    document.getElementById('parsedPreview').innerHTML = previewHtml;
    document.getElementById('parsedPreview').classList.add('show');

  } catch(e) {
    pendingParsed = [];
    document.getElementById('parsedPreview').innerHTML = '<div style="font-size:13px;color:var(--text3)">No se pudo interpretar. Completá los campos manualmente.</div>';
    document.getElementById('parsedPreview').classList.add('show');
  }

  btn.classList.remove('loading');
  icon.innerHTML = '✨';
  label.textContent = 'Interpretar con IA';
}

// ─── ALARM CHECKER ────────────────────────────────────────────────────────────
function startAlarmChecker() {
  checkAlarms();
  if (alarmInterval) clearInterval(alarmInterval);
  alarmInterval = setInterval(() => {
    internalClock = new Date();
    checkAlarms();
  }, 1000);
}

function checkAlarms() {
  internalClock = internalClock || new Date();
  reminders.forEach(r => {
    if (r.status !== 'pending' || r.notified) return;
    if (!r.date || !r.time) return;
    const due = new Date(r.date + 'T' + r.time);
    const diff = internalClock - due;
    if (diff >= 0 && diff < 60000) {
      r.notified = true;
      save();
      showToast(r.text, r.time);
      showAlarm(r);
      // Also try Web Notifications API
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('⏰ Recordar', { body: r.text, icon: '' });
      }
    }
  });
}

function showAlarm(r) {
  activeAlarmId = r.id;
  document.getElementById('alarmText').textContent = r.text;
  document.getElementById('alarmDate').textContent = r.date ? formatDate(r.date) : '';
  document.getElementById('alarmTime').textContent = r.time ? '🕐 ' + r.time : '🕐 --:--';
  document.getElementById('alarmOverlay').classList.add('open');
}

function closeAlarm() {
  activeAlarmId = null;
  document.getElementById('alarmOverlay').classList.remove('open');
}

function completeAlarmReminder() {
  if (activeAlarmId) {
    const r = reminders.find(x => x.id === activeAlarmId);
    if (r) r.status = 'done';
    save();
    renderAll();
  }
  closeAlarm();
}

function showToast(text, time) {
  document.getElementById('toastBody').textContent = text;
  document.getElementById('toastTime').textContent = time ? '🕐 ' + time : '';
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 5000);
}

// Request notification permission on first interaction
document.addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
}, { once: true });
